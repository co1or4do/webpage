  <text x="450" y="392" fill="#6B6B6B" font-family="Arial,sans-serif" font-size="12" text-anchor="middle">Recomendado: 900×520 px, formato JPG o PNG — Foto horizontal, buena iluminación</text>
  <text x="450" y="412" fill="#6B6B6B" font-family="Arial,sans-serif" font-size="12" text-anchor="middle">Nombre de archivo: foto-hacienda-lote.jpg</text>
