<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <style>
    .svc-box { rx:10; }
    .svc-text { font-family: Arial, Helvetica, sans-serif; }
    .arrow { marker-end: url(#arr); }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="rgba(108,172,228,0.7)"/>
    </marker>
    <marker id="arr-mq" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="rgba(232,193,99,0.8)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="#0a0a0a"/>

  <!-- ── CLIENTE / USUARIO ────────────────────────── -->
  <rect x="30" y="240" width="140" height="80" rx="10" fill="#1a1a1a" stroke="#6CACE4" stroke-width="1.5"/>
  <text x="100" y="272" fill="#FAFAFA" font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">🖥️  USUARIO</text>
  <text x="100" y="290" fill="#A3A3A3" font-family="Arial" font-size="9.5" text-anchor="middle">Desktop App</text>
  <text x="100" y="304" fill="#A3A3A3" font-family="Arial" font-size="9.5" text-anchor="middle">Web Browser</text>

  <!-- Arrow: user → UI -->
  <line x1="170" y1="280" x2="218" y2="280" stroke="rgba(108,172,228,0.7)" stroke-width="1.5" class="arrow" marker-end="url(#arr)"/>

  <!-- ── UI SERVICE ─────────────────────────────── -->
  <rect x="220" y="210" width="150" height="140" rx="10" fill="#121212" stroke="#6CACE4" stroke-width="2"/>
  <rect x="220" y="210" width="150" height="26" rx="10" fill="#6CACE4"/>
  <text x="295" y="227" fill="hsl(210,50%,10%)" font-family="Arial" font-size="10" font-weight="800" text-anchor="middle">INTERFAZ UI</text>
  <text x="295" y="256" fill="#FAFAFA" font-family="Arial" font-size="9.5" text-anchor="middle">Next.js 15</text>
  <text x="295" y="272" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">TypeScript / Tailwind</text>
  <text x="295" y="289" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Electron (desktop)</text>
  <text x="295" y="305" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">RabbitMQ WebSocket</text>
  <text x="295" y="321" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">shadcn/ui  ·  Recharts</text>

  <!-- Arrow: UI → Video Service (upload) -->
  <line x1="370" y1="260" x2="418" y2="198" stroke="rgba(108,172,228,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow: UI → User Service (auth) -->
  <line x1="370" y1="300" x2="418" y2="356" stroke="rgba(108,172,228,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow: UI → Metrics Service (reads) -->
  <line x1="370" y1="280" x2="628" y2="360" stroke="rgba(108,172,228,0.4)" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ── VIDEO SERVICE ──────────────────────────── -->
  <rect x="420" y="80" width="150" height="130" rx="10" fill="#121212" stroke="#6CACE4" stroke-width="2"/>
  <rect x="420" y="80" width="150" height="26" rx="10" fill="#6CACE4"/>
  <text x="495" y="97" fill="hsl(210,50%,10%)" font-family="Arial" font-size="10" font-weight="800" text-anchor="middle">VIDEO SERVICE</text>
  <text x="495" y="126" fill="#FAFAFA" font-family="Arial" font-size="9.5" text-anchor="middle">Go 1.22 / Gin</text>
  <text x="495" y="142" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Almacenamiento videos</text>
  <text x="495" y="158" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">REST API  ·  JWT auth</text>
  <text x="495" y="174" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Supabase Storage</text>
  <text x="495" y="190" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Swagger / OpenAPI</text>

  <!-- Arrow: Video Service → Processing (trigger via MQ) -->
  <line x1="570" y1="145" x2="617" y2="145" stroke="rgba(232,193,99,0.8)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-mq)"/>

  <!-- ── VIDEO PROCESSING SERVICE ──────────────── -->
  <rect x="620" y="60" width="160" height="170" rx="10" fill="#121212" stroke="#F25252" stroke-width="2"/>
  <rect x="620" y="60" width="160" height="26" rx="10" fill="#F25252"/>
  <text x="700" y="76" fill="white" font-family="Arial" font-size="10" font-weight="800" text-anchor="middle">PROCESAMIENTO IA</text>
  <text x="700" y="108" fill="#FAFAFA" font-family="Arial" font-size="9.5" text-anchor="middle">Python 3.11 / FastAPI</text>
  <text x="700" y="124" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">YOLOv8 segmentación</text>
  <text x="700" y="140" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">ByteTrack tracking</text>
  <text x="700" y="156" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">GSD → estimación peso</text>
  <text x="700" y="172" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Clasificación z-score</text>
  <text x="700" y="188" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Generación PDF</text>
  <text x="700" y="204" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">GPU / CUDA (NVIDIA)</text>

  <!-- Arrow: Processing → RabbitMQ (results) -->
  <line x1="700" y1="230" x2="700" y2="298" stroke="rgba(232,193,99,0.8)" stroke-width="1.5" marker-end="url(#arr-mq)"/>

  <!-- ── RABBITMQ ────────────────────────────────── -->
  <rect x="620" y="300" width="160" height="72" rx="10" fill="#121212" stroke="#E8C163" stroke-width="2"/>
  <rect x="620" y="300" width="160" height="22" rx="10" fill="#E8C163"/>
  <text x="700" y="315" fill="hsl(40,50%,10%)" font-family="Arial" font-size="10" font-weight="800" text-anchor="middle">🐰  RABBITMQ</text>
  <text x="700" y="340" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Bus de mensajes asíncrono</text>
  <text x="700" y="356" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Procesado ↔ Métricas ↔ UI</text>

  <!-- Arrow: RabbitMQ → Metrics Service -->
  <line x1="700" y1="372" x2="700" y2="420" stroke="rgba(232,193,99,0.8)" stroke-width="1.5" marker-end="url(#arr-mq)"/>

  <!-- ── METRICS SERVICE ────────────────────────── -->
  <rect x="620" y="422" width="160" height="130" rx="10" fill="#121212" stroke="#6CACE4" stroke-width="2"/>
  <rect x="620" y="422" width="160" height="26" rx="10" fill="#6CACE4"/>
  <text x="700" y="438" fill="hsl(210,50%,10%)" font-family="Arial" font-size="10" font-weight="800" text-anchor="middle">METRICS SERVICE</text>
  <text x="700" y="466" fill="#FAFAFA" font-family="Arial" font-size="9.5" text-anchor="middle">Node.js / Hono</text>
  <text x="700" y="482" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Almacena resultados</text>
  <text x="700" y="498" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Historial de vuelos</text>
  <text x="700" y="514" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Evolución de peso</text>
  <text x="700" y="530" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">PostgreSQL (Supabase)</text>

  <!-- ── USER SERVICE ───────────────────────────── -->
  <rect x="420" y="340" width="150" height="120" rx="10" fill="#121212" stroke="#6CACE4" stroke-width="2"/>
  <rect x="420" y="340" width="150" height="26" rx="10" fill="#6CACE4"/>
  <text x="495" y="357" fill="hsl(210,50%,10%)" font-family="Arial" font-size="10" font-weight="800" text-anchor="middle">USER SERVICE</text>
  <text x="495" y="384" fill="#FAFAFA" font-family="Arial" font-size="9.5" text-anchor="middle">Node.js / Hono</text>
  <text x="495" y="400" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Autenticación JWT</text>
  <text x="495" y="416" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Gestión de usuarios</text>
  <text x="495" y="432" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">Establecimientos / Lotes</text>
  <text x="495" y="448" fill="#A3A3A3" font-family="Arial" font-size="9" text-anchor="middle">PostgreSQL (Supabase)</text>

  <!-- ── DOCKER wrapper label ───────────────────── -->
  <rect x="18" y="30" width="430" height="530" rx="14" fill="none" stroke="#262626" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="30" y="48" fill="#6B6B6B" font-family="Arial" font-size="9.5" font-weight="700">🐋  Docker Compose — Contenedores</text>

  <rect x="460" y="30" width="528" height="530" rx="14" fill="none" stroke="#262626" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="472" y="48" fill="#6B6B6B" font-family="Arial" font-size="9.5" font-weight="700">🔧  Microservicios de backend</text>

  <!-- ── LEGEND ─────────────────────────────────── -->
  <rect x="820" y="490" width="165" height="90" rx="8" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="830" y="507" fill="#A3A3A3" font-family="Arial" font-size="9" font-weight="700">REFERENCIAS</text>
  <line x1="830" y1="520" x2="860" y2="520" stroke="rgba(108,172,228,0.7)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="866" y="523" fill="#A3A3A3" font-family="Arial" font-size="9">Petición REST / HTTP</text>
  <line x1="830" y1="538" x2="860" y2="538" stroke="rgba(232,193,99,0.8)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-mq)"/>
  <text x="866" y="541" fill="#A3A3A3" font-family="Arial" font-size="9">Mensaje RabbitMQ</text>
  <line x1="830" y1="556" x2="860" y2="556" stroke="rgba(108,172,228,0.4)" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="866" y="559" fill="#A3A3A3" font-family="Arial" font-size="9">Consulta (lectura)</text>
  <text x="830" y="574" fill="#A3A3A3" font-family="Arial" font-size="9">DAG — Arquitectura v1.0</text>
</svg>
