<svg xmlns="http://www.w3.org/2000/svg" width="700" height="480" viewBox="0 0 700 480">
  <rect width="700" height="480" fill="#121212" rx="16"/>
  <rect x="2" y="2" width="696" height="476" fill="none" stroke="#6CACE4" stroke-width="2.5" stroke-dasharray="14,7" rx="14"/>
  <!-- Person with tablet icon -->
  <g transform="translate(350,195)">
    <!-- Head -->
    <circle cx="0" cy="-60" r="22" fill="none" stroke="#6CACE4" stroke-width="2.5"/>
    <!-- Body -->
    <line x1="0" y1="-38" x2="0" y2="20" stroke="#6CACE4" stroke-width="2.5"/>
    <!-- Arms -->
    <line x1="0" y1="-20" x2="-38" y2="0" stroke="#6CACE4" stroke-width="2.5"/>
    <line x1="0" y1="-20" x2="38"  y2="0" stroke="#6CACE4" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="0" y1="20" x2="-22" y2="60" stroke="#6CACE4" stroke-width="2.5"/>
    <line x1="0" y1="20" x2="22"  y2="60" stroke="#6CACE4" stroke-width="2.5"/>
    <!-- Tablet in hands -->
    <rect x="-48" y="-10" width="36" height="28" rx="4" fill="none" stroke="#6CACE4" stroke-width="2"/>
    <!-- Screen content on tablet -->
    <line x1="-44" y1="-3" x2="-16" y2="-3" stroke="#6CACE4" stroke-width="1.2" opacity="0.7"/>
    <line x1="-44" y1="4"  x2="-24" y2="4"  stroke="#6CACE4" stroke-width="1.2" opacity="0.7"/>
    <line x1="-44" y1="11" x2="-20" y2="11" stroke="#6CACE4" stroke-width="1.2" opacity="0.7"/>
  </g>
  <text x="350" y="305" fill="#6CACE4" font-family="Arial,sans-serif" font-size="17" font-weight="700" text-anchor="middle">FOTO A REEMPLAZAR</text>
  <text x="350" y="335" fill="#A3A3A3" font-family="Arial,sans-serif" font-size="14" text-anchor="middle">Productor ganadero consultando la app DAG en tablet o celular</text>
  <text x="350" y="359" fill="#6B6B6B" font-family="Arial,sans-serif" font-size="12" text-anchor="middle">Recomendado: 700×480 px, formato JPG o PNG</text>
  <text x="350" y="379" fill="#6B6B6B" font-family="Arial,sans-serif" font-size="12" text-anchor="middle">Nombre de archivo: foto-productor-tablet.jpg</text>
</svg>
